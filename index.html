    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "RunToSolve, LLC",
        "url": "https://www.runtosolve.com/",
        "email": "contact@runtosolve.com",
        "description": "Engineering technology company advancing the steel construction industry with software, simulation, design, and research.",
        "sameAs": ["https://www.linkedin.com/company/runtosolve"]
      }
    </script>
    <!-- Apply the saved/system theme before paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("rts-theme");
          var dark =
            stored === "dark" ||
            (!stored &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
